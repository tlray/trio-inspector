name: Deploy to GitHub Pages

# Publishes the shareable single-file app (index.html) to GitHub Pages.
# index.html contains NO data or tokens — the Nightscout URL/token a user enters
# stays in that user's own browser (localStorage), never in the repo or the site.

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          # standalone experiments, if present
          for f in variable-map.html playground.html; do
            [ -f "$f" ] && cp "$f" "_site/$f" || true
          done
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
